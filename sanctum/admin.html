<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gatekeeper's Codex</title>
  <link rel="icon" href="assets/logos/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=IM+Fell+English:ital@0;1&family=Special+Elite&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/admin.css" />
</head>
<body class="admin-body">
  <main class="admin-shell">
    <header class="admin-hero"><img src="assets/logos/sanctum-logo.png" alt=""><div><p class="eyebrow">Gatekeeper's Codex</p><h1>Sanctum Admin</h1><p>Save changes to the shared Netlify backend for cross-device sync.</p></div></header>
    <section id="loginPanel" class="panel"><h2>Unlock Admin</h2><p class="muted">Enter your admin passphrase.</p><input id="adminKey" type="password" placeholder="Passphrase"><button id="unlockBtn" class="btn primary">Unlock</button><p id="loginMsg" class="warn"></p></section>
    <section id="adminPanel" class="hidden">
      <div class="admin-toolbar"><a href="index.html" class="btn ghost">View Site</a><button id="saveRemote" class="btn primary">Save Changes to Site</button><button id="reloadRemote" class="btn ghost">Reload Shared Data</button><button id="exportJson" class="btn ghost">Export Backup</button><label class="btn ghost file-label">Import Backup<input id="importBackup" type="file" accept="application/json"></label><span id="saveStatus" class="status"></span></div>
      <nav class="tabs" id="tabs"></nav>
      <section id="tabView" class="panel"></section>
    </section>
  </main>
  <script src="assets/js/shared.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
